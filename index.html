<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Inventory Management System - WASM</title>
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background: #0f172a;
        color: #f8fafc;
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
      }
      .container {
        width: 95%;
        max-width: 1100px;
        background: #1e293b;
        border-radius: 12px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        padding: 20px;
        border: 1px solid #334155;
      }
      h1 { text-align: center; color: #38bdf8; margin-bottom: 20px; }
      #terminal-container {
        position: relative;
        background: #000;
        border-radius: 8px;
        overflow: hidden;
        border: 1px solid #475569;
      }
      #output {
        width: 100%;
        height: 500px;
        background: #000;
        color: #10b981;
        font-family: 'Fira Code', monospace;
        padding: 15px;
        border: none;
        resize: vertical;
        outline: none;
        font-size: 15px;
        line-height: 1.4;
        white-space: pre-wrap;
        overflow-y: auto;
      }
      /* Hidden input to capture keystrokes */
      #hidden-input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }
      .cursor {
        display: inline-block;
        width: 8px;
        height: 18px;
        background: #10b981;
        animation: blink 1s step-end infinite;
        vertical-align: middle;
      }
      @keyframes blink { 50% { opacity: 0; } }
      .status { margin-top: 10px; font-size: 12px; color: #64748b; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>📦 Inventory System Pro</h1>
      <div id="terminal-container" onclick="document.getElementById('hidden-input').focus()">
        <div id="output"></div>
        <input type="text" id="hidden-input" autocomplete="off">
      </div>
      <div class="status" id="status">System Ready. Click terminal to focus.</div>
    </div>

    <script type='text/javascript'>
      var outputElement = document.getElementById('output');
      var hiddenInput = document.getElementById('hidden-input');
      var statusElement = document.getElementById('status');
      
      var inputBuffer = "";
      var inputResolver = null;
      var isWaitingForInput = false;

      function appendToTerminal(text) {
        outputElement.innerText += text;
        outputElement.scrollTop = outputElement.scrollHeight;
      }

      hiddenInput.addEventListener('input', (e) => {
        if (!isWaitingForInput) return;
        // Echo the characters typed (simple implementation)
        const val = e.target.value;
        const char = val.slice(-1);
        if (val.length > inputBuffer.length) {
            appendToTerminal(char);
            inputBuffer = val;
        }
      });

      hiddenInput.addEventListener('keydown', (e) => {
        if (!isWaitingForInput) return;
        if (e.key === 'Enter') {
          appendToTerminal("\n");
          let result = inputBuffer;
          inputBuffer = "";
          hiddenInput.value = "";
          isWaitingForInput = false;
          if (inputResolver) inputResolver(result);
        } else if (e.key === 'Backspace') {
          if (inputBuffer.length > 0) {
            inputBuffer = inputBuffer.slice(0, -1);
            outputElement.innerText = outputElement.innerText.slice(0, -1);
          }
        }
      });

      var Module = {
        print: (text) => appendToTerminal(text + "\n"),
        printNoNewline: (text) => appendToTerminal(text),
        printErr: (text) => console.error(text),
        setStatus: (text) => { statusElement.innerText = text; },
        // Custom function to be called from C via EM_ASYNC_JS
        waitForBrowserInput: function() {
          isWaitingForInput = true;
          hiddenInput.focus();
          return new Promise((resolve) => {
            inputResolver = resolve;
          });
        }
      };

      // Ensure click focuses input
      document.body.addEventListener('click', () => hiddenInput.focus());
    </script>
    <script async type="text/javascript" src="index.js"></script>
  </body>
</html>
